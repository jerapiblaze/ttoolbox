services:
  db:
    image: mariadb:10.6
    container_name: nextcloud-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: nextcloud
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - ./data/db:/var/lib/mysql
    networks:
      - nextcloud

  app:
    image: nextcloud
    container_name: nextcloud-app
    restart: always
    ports:
      - 8088:80
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    depends_on:
      - db
    volumes:
      - ./data/data:/var/www/html
    networks:
      - nextcloud

networks:
  nextcloud:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: nextcloud
